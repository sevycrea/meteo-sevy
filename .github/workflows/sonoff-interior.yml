name: Capteur intérieur SONOFF SNZB-02

on:
  schedule:
    - cron: '4,19,34,49 * * * *'
  workflow_dispatch:

concurrency:
  group: sonoff-interior
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer dépendances
        run: pip install aioEweLink

      - name: Récupérer données SNZB-02 → interior.json
        env:
          EWELINK_EMAIL:    ${{ secrets.EWELINK_EMAIL }}
          EWELINK_PASSWORD: ${{ secrets.EWELINK_PASSWORD }}
          EWELINK_DEVICE_ID: a480075689
          DATA_FTP_HOST:    ${{ secrets.DATA_FTP_HOST }}
          DATA_FTP_USER:    ${{ secrets.DATA_FTP_USER }}
          DATA_FTP_PASS:    ${{ secrets.DATA_FTP_PASS }}
        run: python scripts/fetch_interior.py
