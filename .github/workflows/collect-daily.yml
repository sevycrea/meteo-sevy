name: Collecte données journalières

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer dépendances
        run: pip install requests numpy

      - name: Collecter données journalières
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
          WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          DATA_FTP_HOST: ${{ secrets.DATA_FTP_HOST }}
          DATA_FTP_USER: ${{ secrets.DATA_FTP_USER }}
          DATA_FTP_PASS: ${{ secrets.DATA_FTP_PASS }}
        run: python scripts/auto_meteo_wunderground.py

      - name: Enrichir données (agrégation périodes)
        run: python scripts/aggregate_periods.py

      - name: Upload logs FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python scripts/upload_log_ftp.py logs/auto_update_wunderground.log
          python scripts/upload_log_ftp.py logs/aggregation.log

      - name: Commit données mises à jour
        run: |
          git config user.name "Meteo Bot"
          git config user.email "bot@meteo-sevy.ch"
          git add data/
          if git diff --staged --quiet; then
            echo "Aucun changement à commit"
            exit 0
          fi
          git commit -m "📊 Données journalières $(date -u +'%Y-%m-%d %H:%M')"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main || true
            if git push origin main; then
              echo "Push OK (tentative $i)"
              exit 0
            fi
            sleep $((i * 3))
          done
          exit 1
