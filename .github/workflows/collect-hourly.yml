name: Collecte données horaires

on:
  schedule:
    # Toutes les 15 min, décalé de 7 min pour éviter la congestion GitHub Actions
    # qui drop les crons tombant sur des minutes rondes (00, 10, 20…) à fort trafic.
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer dépendances
        run: pip install requests

      - name: Collecter données horaires
        env:
          WU_API_KEY: ${{ secrets.WU_API_KEY }}
          WU_STATION_ID: ${{ secrets.WU_STATION_ID }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          DATA_FTP_HOST: ${{ secrets.DATA_FTP_HOST }}
          DATA_FTP_USER: ${{ secrets.DATA_FTP_USER }}
          DATA_FTP_PASS: ${{ secrets.DATA_FTP_PASS }}
        run: python scripts/auto_meteo_wunderground_hourly.py

      - name: Upload log FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/upload_log_ftp.py logs/auto_wunderground_hourly.log

      - name: Commit données mises à jour
        run: |
          git config user.name "Meteo Bot"
          git config user.email "bot@meteo-sevy.ch"
          git add data/
          git diff --staged --quiet || git commit -m "⏱️ Données horaires $(date -u +'%Y-%m-%d %H:%M')"
          git push
