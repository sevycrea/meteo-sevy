name: Prévisions météo IA

on:
  schedule:
    # 4×/jour pour avoir un NWP frais à chaque période de la journée :
    # 04h UTC = 06h CEST (matin frais)
    # 10h UTC = 12h CEST (mi-journée, juste avant orages d'été)
    # 16h UTC = 18h CEST (soir, validation prévisions du jour)
    # 22h UTC = 00h CEST (nuit)
    - cron: '0 4 * * *'
    - cron: '0 10 * * *'
    - cron: '0 16 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer dépendances
        run: pip install -r requirements.txt

      # 1) Récupérer le NWP frais (Open-Meteo / MetNo) — 7 jours à partir d'aujourd'hui
      - name: Récupérer NWP MetNo
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/fetch_nwp_forecast.py

      # 2) Générer les prévisions ML multihorizon (utilise le NWP frais)
      - name: Générer prévisions ML
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/predict_weather_multihorizon.py

      # 3) Générer les créneaux horaires 2h × 7 jours (utilise NWP + corrections ML)
      - name: Générer prévisions horaires (créneaux 2h)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: python scripts/predict_hourly.py

      - name: Upload logs FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python scripts/upload_log_ftp.py logs/predictions_multihorizon.log || true
          python scripts/upload_log_ftp.py logs/nwp_forecast.log || true
          python scripts/upload_log_ftp.py logs/predictions_hourly.log || true

      - name: Commit prévisions
        run: |
          git config user.name "Meteo Bot"
          git config user.email "bot@meteo-sevy.ch"
          git add data/
          git diff --staged --quiet || git commit -m "🤖 Prévisions IA $(date -u +'%Y-%m-%d %H:%M')"
          git push
