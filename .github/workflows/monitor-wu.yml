name: Surveillance cle WU + endpoint live

on:
  schedule:
    - cron: '17 5,17 * * *'   # 2x/jour (best-effort GitHub) ; + workflow_dispatch
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Controle endpoint live + echeance cle
        id: chk
        run: |
          OUT=$(python3 scripts/check_wu_health.py)
          echo "result=$OUT" >> "$GITHUB_OUTPUT"
          echo "Resultat: $OUT"
      - name: Alerte email (si besoin)
        if: steps.chk.outputs.result == 'ALERT'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: "Meteo Sevy - action sur la cle Wunderground"
          to: ${{ secrets.MAIL_TO }}
          from: "Meteo Sevy <${{ secrets.MAIL_USER }}>"
          body: file://alert_body.txt
