name: Surveillance cle WU + endpoint live

on:
  schedule:
    - cron: '17 5,17 * * *'   # 2x/jour (best-effort GitHub) ; + workflow_dispatch
  workflow_dispatch:
    inputs:
      force_test:
        description: "Envoyer un email de TEST (cocher pour tester la livraison)"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Controle endpoint live + echeance cle
        id: chk
        run: |
          if [ "${{ github.event.inputs.force_test }}" = "true" ]; then
            printf '%s\n' "TEST du moniteur Meteo Sevy." "" "Si tu recois ce message, les alertes email fonctionnent." > alert_body.txt
            echo "result=ALERT" >> "$GITHUB_OUTPUT"
            echo "Mode TEST"
          else
            OUT=$(python3 scripts/check_wu_health.py)
            echo "result=$OUT" >> "$GITHUB_OUTPUT"
            echo "Resultat: $OUT"
          fi
      - name: Alerte email (si besoin)
        if: steps.chk.outputs.result == 'ALERT'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_HOST }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USER }}
          password: ${{ secrets.MAIL_PASS }}
          subject: "Meteo Sevy - alerte cle Wunderground"
          to: ${{ secrets.MAIL_TO }}
          from: "Meteo Sevy <${{ secrets.MAIL_USER }}>"
          body: file://alert_body.txt
